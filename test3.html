<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 3</title>
<style>
  body { background: #050308; color: white; font-family: sans-serif; padding: 40px; }
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>
<div id="home-page" class="page active">
  <h1>KuroSakura Test 3</h1>
  <p>Testing JS page-switching logic, no emoji.</p>
  <button onclick="showPage('watch')">Go to watch page</button>
</div>
<div id="watch-page" class="page">
  <h1>Watch Page</h1>
  <button onclick="showPage('home')">Back</button>
</div>
<script>
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(name + '-page').classList.add('active');
  }
</script>
</body>
</html>
