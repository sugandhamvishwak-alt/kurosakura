  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuroSakura Player</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0b0c10;
  --deep: #07080a;
  --card: #0f1219;
  --elevated: #1a1e2e;
  --primary: #ff4a5a;
  --text: #c5c6c7;
  --text-bright: #ffffff;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(255,74,90,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(255,74,90,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--void); }
::-webkit-scrollbar-thumb { background:var(--elevated); border-radius:2px; }

nav {
  position: fixed;
  top:0; left:0; right:0;
  z-index: 100;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(11,12,16,0.96);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,74,90,0.2);
}
.nav-logo {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-bright);
  cursor: pointer;
  text-decoration: none;
}
.nav-logo span { color: var(--primary); }
.nav-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s;
  background: none;
  border: none;
  font-family: 'Inter', sans-serif;
  text-decoration: none;
}
.nav-back:hover { color: var(--primary); }

.layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  min-height: 100vh;
  padding-top: 54px;
}

.main { padding: 18px 20px; position: relative; z-index:1; }

.player-box {
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 16/9;
  position: relative;
  border: 1px solid rgba(255,74,90,0.2);
  box-shadow: 0 0 60px rgba(255,74,90,0.08), 0 8px 40px rgba(0,0,0,0.9);
}
.player-box iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.player-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: radial-gradient(ellipse at center, #1a0018 0%, #000 70%);
  cursor: pointer;
}
.player-placeholder:hover .play-ring { box-shadow: 0 0 70px rgba(255,74,90,0.6); }
.play-ring {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #d63545);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: #fff;
  box-shadow: 0 0 40px rgba(255,74,90,0.4);
  transition: all 0.25s;
  border: 2px solid rgba(255,255,255,0.2);
}
.play-hint {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 1px;
}
.petal-deco {
  font-size: 22px;
  opacity: 0.4;
  letter-spacing: 8px;
}

.anime-info { margin-top: 16px; }
.anime-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.anime-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.2;
}
.ep-badge {
  background: rgba(255,74,90,0.15);
  border: 1px solid rgba(255,74,90,0.25);
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}
.anime-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text);
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.meta-score { color: #f4c430; font-weight: 700; }
.meta-dot { color: var(--text); }
.meta-genre {
  background: rgba(255,74,90,0.08);
  border: 1px solid rgba(255,74,90,0.2);
  color: var(--text);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.act-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--elevated);
  border: 1px solid rgba(255,74,90,0.2);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.18s;
  font-family: 'Inter', sans-serif;
}
.act-btn:hover { border-color: rgba(255,74,90,0.5); color: var(--primary); background: rgba(255,74,90,0.1); }
.act-btn.primary { background: linear-gradient(135deg, var(--primary), #d63545); border-color: var(--primary); color: #fff; }
.act-btn.primary:hover { background: linear-gradient(135deg, #ff5a6a, var(--primary)); }

.server-section { margin-top: 4px; }
.server-label {
  font-size: 10px;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 7px;
  font-family: 'Rajdhani', sans-serif;
}
.server-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.stab {
  background: var(--card);
  border: 1px solid rgba(255,74,90,0.2);
  color: var(--text);
  padding: 6px 16px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.18s;
  font-family: 'Inter', sans-serif;
}
.stab.active, .stab:hover {
  background: rgba(255,74,90,0.1);
  border-color: var(--primary);
  color: var(--primary);
}

.sidebar {
  border-left: 1px solid rgba(255,74,90,0.2);
  background: var(--deep);
  overflow-y: auto;
  max-height: calc(100vh - 54px);
  position: sticky;
  top: 54px;
  z-index: 1;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,74,90,0.2);
  position: sticky;
  top: 0;
  background: var(--deep);
  z-index: 2;
}
.sidebar-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--primary);
  border-radius: 2px;
  display: block;
}
.ep-count-label { font-size: 11px; color: var(--text); }
.ep-search {
  width: 100%;
  background: var(--elevated);
  border: 1px solid rgba(255,74,90,0.2);
  color: var(--text-bright);
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  margin-top: 8px;
  outline: none;
  transition: border-color 0.2s;
}
.ep-search:focus { border-color: var(--primary); }
.ep-search::placeholder { color: var(--text); }

.ep-list { padding: 8px; }
.ep-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 7px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.18s;
  margin-bottom: 3px;
}
.ep-item:hover { background: var(--elevated); border-color: rgba(255,74,90,0.2); }
.ep-item.active {
  background: rgba(255,74,90,0.1);
  border-color: rgba(255,74,90,0.3);
}
.ep-item.filler { opacity: 0.55; }
.ep-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  min-width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.ep-item.active .ep-num { color: var(--primary); }
.ep-details { flex: 1; min-width: 0; }
.ep-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
  color: var(--text-bright);
}
.ep-item.filler .ep-name { color: var(--text); }
.ep-meta { display: flex; align-items: center; gap: 6px; }
.ep-dur { font-size: 10px; color: var(--text); }
.filler-tag {
  font-size: 8px;
  font-weight: 700;
  color: var(--text);
  background: #0f000d;
  border: 1px solid #2a1020;
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}
.watched-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  flex-shrink: 0;
  opacity: 0;
}
.ep-item.watched .watched-dot { opacity: 1; }

.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 16px;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,74,90,0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text); }
.error-wrap {
  text-align: center;
  padding: 40px 20px;
  color: var(--text);
}
.error-wrap h3 { font-family:'Rajdhani', sans-serif; color:var(--primary); margin-bottom:8px; }

.petal-divider {
  text-align: center;
  color: rgba(255,74,90,0.2);
  font-size: 14px;
  letter-spacing: 6px;
  margin: 10px 0;
  user-select: none;
}

@media(max-width:768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    max-height: 320px;
    border-left: none;
    border-top: 1px solid rgba(255,74,90,0.2);
    position: static;
  }
  .main { padding: 12px 14px; }
  .anime-title { font-size: 17px; }
  nav { padding: 0 14px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Kuro<span>Sakura</span></a>
  <a class="nav-back" href="/">← Browse</a>
</nav>

<div class="layout">

  <div class="main">

    <div class="player-box" id="playerBox">
      <div class="player-placeholder" id="placeholder" onclick="loadPlayer()">
        <div class="petal-deco">🌸 🌸 🌸</div>
        <div class="play-ring">▶</div>
        <div class="play-hint" id="playHint">Tap to Watch</div>
      </div>
    </div>

    <div class="anime-info">
      <div class="anime-title-row">
        <div class="anime-title" id="animeTitle">Loading...</div>
        <div class="ep-badge" id="epBadge">EP 1</div>
      </div>
      <div class="anime-meta" id="animeMeta">
        <span class="loading-text">Fetching anime info...</span>
      </div>
      <div class="action-row">
        <button class="act-btn primary" onclick="loadPlayer()">▶ Play Episode</button>
        <button class="act-btn" onclick="toggleWatched()">✓ Mark Watched</button>
        <button class="act-btn" onclick="shareEp()">↗ Share</button>
        <button class="act-btn">✚ My List</button>
      </div>

      <div class="server-section">
        <div class="server-label">🌸 Sub Servers</div>
        <div class="server-tabs">
          <div class="stab active" onclick="setServer(this,'vidsrc',1)">VidSrc</div>
          <div class="stab" onclick="setServer(this,'vidsrcpro',1)">VidSrc Pro</div>
          <div class="stab" onclick="setServer(this,'embed',1)">Embed</div>
          <div class="stab" onclick="setServer(this,'animefree',1)">AnimeFree</div>
        </div>
        <div class="server-label">🌸 Dub Servers</div>
        <div class="server-tabs">
          <div class="stab" onclick="setServer(this,'vidsrc-dub',1)">VidSrc Dub</div>
          <div class="stab" onclick="setServer(this,'vidsrcpro-dub',1)">Pro Dub</div>
        </div>
      </div>
    </div>

  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Episodes</div>
      <div class="ep-count-label" id="epCountLabel">Loading...</div>
      <input class="ep-search" type="text" placeholder="Search episodes..." oninput="filterEps(this.value)" id="epSearchInput">
    </div>
    <div class="ep-list" id="epList">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading episodes...</div>
      </div>
    </div>
  </div>

</div>

<script>
// CONFIG
const FILLER_RANGES = {
  21: [[136,220]],
  1735: [[57,70],[91,112],[144,151],[176,196],[223,242],[257,260],[271,278],[279,281],[376,389],[394,413],[416,417],[422,423],[427,457],[460,462],[464,469],[480,483]],
  269: [[33,50],[64,109],[128,137],[147,149],[168,189],[204,205],[213,214],[228,229],[231,265],[287,297],[299,300],[303,305],[311,341],[355,361]],
};

// STATE
let animeId = null;
let totalEps = 0;
let currentEp = 1;
let currentServer = 'vidsrc';
let watchedEps = new Set();
let allEpData = [];
let animeData = null;

// INIT
function init() {
  const params = new URLSearchParams(window.location.search);
  animeId = params.get('id');
  const ep = params.get('ep');
  if (ep) currentEp = parseInt(ep) || 1;

  if (!animeId) {
    showError('No anime ID provided. <a href="/" style="color:var(--primary)">Go back home</a>');
    return;
  }
  fetchAnime();
}

async function fetchAnime() {
  try {
    const query = `query($id:Int){Media(id:$id,type:ANIME){id title{romaji english}coverImage{large extraLarge}bannerImage averageScore episodes genres startDate{year}description(asHtml:false)}}`;
    const res = await fetch('https://graphql.anilist.co', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query, variables:{id:parseInt(animeId)}})
    });
    const json = await res.json();
    animeData = json.data?.Media;
    if (!animeData) throw new Error('Anime not found');
    renderInfo(animeData);
    buildEpisodes(animeData);
  } catch(e) {
    showError('Could not load anime data. ' + e.message);
  }
}

function renderInfo(a) {
  const title = a.title?.english || a.title?.romaji || 'Anime';
  document.title = title + ' — KuroSakura';
  document.getElementById('animeTitle').textContent = title;

  const score = a.averageScore ? (a.averageScore/10).toFixed(1) : '?';
  const year = a.startDate?.year || '';
  const genres = (a.genres||[]).slice(0,3);
  document.getElementById('animeMeta').innerHTML = `
    <span class="meta-score">★ ${score}</span>
    <span class="meta-dot">·</span>
    <span>${year}</span>
    <span class="meta-dot">·</span>
    ${genres.map(g=>`<span class="meta-genre">${g}</span>`).join('')}
  `;
}

function buildEpisodes(a) {
  totalEps = a.episodes || 12;

  allEpData = [];
  for (let i = 1; i <= totalEps; i++) {
    const isFiller = checkFiller(parseInt(animeId), i);
    allEpData.push({
      num: i,
      title: `Episode ${i}`,
      filler: isFiller
    });
  }

  document.getElementById('epCountLabel').textContent = totalEps + ' episodes';
  renderEpList(allEpData);
  updateEpBadge();
}

function checkFiller(id, ep) {
  const ranges = FILLER_RANGES[id];
  if (!ranges) return false;
  return ranges.some(([s,e]) => ep >= s && ep <= e);
}

function renderEpList(eps) {
  const list = document.getElementById('epList');
  if (!eps.length) {
    list.innerHTML = '<div class="error-wrap"><p>No episodes found.</p></div>';
    return;
  }

  let html = '';
  eps.forEach((ep, idx) => {
    if (idx > 0 && ep.num % 25 === 1) {
      html += `<div class="petal-divider">· · 🌸 · ·</div>`;
    }
    const isActive = ep.num === currentEp;
    const isWatched = watchedEps.has(ep.num);
    html += `
      <div class="ep-item ${ep.filler?'filler':''} ${isActive?'active':''} ${isWatched?'watched':''}"
           id="ep-${ep.num}"
           onclick="selectEp(${ep.num})">
        <div class="ep-num">${ep.num}</div>
        <div class="ep-details">
          <div class="ep-name">${ep.title}</div>
          <div class="ep-meta">
            <span class="ep-dur">23 min</span>
            ${ep.filler ? '<span class="filler-tag">FILLER</span>' : ''}
          </div>
        </div>
        <div class="watched-dot"></div>
      </div>`;
  });
  list.innerHTML = html;
  scrollToActive();
}

function filterEps(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderEpList(allEpData); return; }
  const filtered = allEpData.filter(ep =>
    ep.title.toLowerCase().includes(q) ||
    ep.num.toString().includes(q)
  );
  renderEpList(filtered);
}

function scrollToActive() {
  setTimeout(() => {
    const active = document.getElementById('ep-' + currentEp);
    if (active) active.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function selectEp(n) {
  currentEp = n;
  updateEpBadge();
  document.querySelectorAll('.ep-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('ep-' + n);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
  const url = new URL(window.location);
  url.searchParams.set('ep', n);
  history.pushState({}, '', url);
  if (document.getElementById('playerBox').querySelector('iframe')) {
    loadPlayer();
  } else {
    document.getElementById('playHint').textContent = 'Tap to watch Episode ' + n;
  }
  document.getElementById('playerBox').scrollIntoView({behavior:'smooth', block:'start'});
}

function updateEpBadge() {
  document.getElementById('epBadge').textContent = 'EP ' + currentEp;
}

async function getStreamUrl() {
  try {
    switch(currentServer) {
      case 'vidsrc':
        return `https://vidsrc.me/embed/anime/${animeId}/${currentEp}`;
      case 'vidsrcpro':
        return `https://vidsrc.me/embed/anime/${animeId}/${currentEp}`;
      case 'embed':
        return `https://embed.malweb.org/?video=crunchyroll/${animeId}/${currentEp}`;
      case 'animefree':
        return `https://www.9anime.to/watch/${animeId}?ep=${currentEp}`;
      case 'vidsrc-dub':
        return `https://vidsrc.me/embed/anime/${animeId}/${currentEp}?dub=1`;
      case 'vidsrcpro-dub':
        return `https://vidsrc.me/embed/anime/${animeId}/${currentEp}?dub=1`;
      default:
        return `https://vidsrc.me/embed/anime/${animeId}/${currentEp}`;
    }
  } catch(e) {
    console.error('Stream URL error:', e);
    return null;
  }
}

function loadPlayer() {
  const src = getStreamUrl();
  if (!src) {
    document.getElementById('playerBox').innerHTML = `
      <div class="player-placeholder" style="background: #1a0018;">
        <div style="color: var(--primary); text-align: center;">
          <p>❌ Stream not available</p>
          <p style="font-size: 12px; margin-top: 10px;">Try switching servers or check back later</p>
        </div>
      </div>`;
    return;
  }
  
  document.getElementById('playerBox').innerHTML = `
    <iframe src="${src}"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture"
      referrerpolicy="no-referrer"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
    </iframe>`;
  
  watchedEps.add(currentEp);
  const el = document.getElementById('ep-' + currentEp);
  if (el) el.classList.add('watched');
}

function setServer(el, server, num) {
  el.parentElement.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentServer = server;
  if (document.getElementById('playerBox').querySelector('iframe')) loadPlayer();
}

function toggleWatched() {
  if (watchedEps.has(currentEp)) {
    watchedEps.delete(currentEp);
  } else {
    watchedEps.add(currentEp);
  }
  const el = document.getElementById('ep-' + currentEp);
  if (el) el.classList.toggle('watched');
}

function shareEp() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ 
      title: document.getElementById('animeTitle').textContent,
      text: 'Watch ' + document.getElementById('animeTitle').textContent,
      url: url 
    });
  } else {
    alert('Share URL: ' + url);
  }
}

function showError(msg) {
  const list = document.getElementById('epList');
  list.innerHTML = `<div class="error-wrap"><h3>Error</h3><p>${msg}</p></div>`;
  document.getElementById('animeTitle').textContent = 'Error';
  document.getElementById('animeMeta').innerHTML = msg;
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
